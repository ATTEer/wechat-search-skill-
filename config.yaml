# ============================================
# 微信公众号文章采集 - 用户配置
# ============================================
# 修改以下配置来自定义采集行为
# ============================================

# MD 文件和附件的输出根目录
# 示例: "D:/MyObsidian/vault/微信文章"
output_dir: "./output"

# 图片附件子目录名（相对于 output_dir）
attachments_dir: "attachments"

# Chrome DevTools Protocol 连接地址
# 需要以 --remote-debugging-port=9222 启动 Chrome
cdp_endpoint: "http://127.0.0.1:9222"

# 搜索结果最大翻页数量
pages_to_search: 20

# 单次搜索最多采集的文章数量上限
# 0 = 不限制（按 pages_to_search 翻完所有页）
# 建议批量时设置为实际需要的数量，避免过度采集
max_results: 20

# 页面访问间隔（秒）
fetch_interval: 2

# 每批 LLM 处理的文章数量
batch_size: 5

# 是否将图片以 Base64 编码嵌入 Markdown 文件
# true: 图片内嵌，每个 .md 文件完全独立，不依赖外部图片文件（文件体积较大）
# false: 图片以相对路径引用 attachments 目录中的本地文件（默认）
embed_images: true

# 持久化 Chrome 登录状态的用户数据目录
# 留空则自动使用系统临时目录（如 C:\Users\xxx\AppData\Local\Temp\wechat-search-chrome-profile）
# 示例: "C:/Users/xxx/.wechat-search-profile"
user_data_dir: ""
